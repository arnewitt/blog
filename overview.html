<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Blog articles by Arne Wittmaack on Generative AI, machine learning, and technology architecture.">
  <meta property="og:title" content="Blog Overview - Arne Wittmaack">
  <meta property="og:description" content="Blog articles on Generative AI, machine learning, and technology architecture.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.arnewittmaack.org/overview.html">
  <title>Blog Overview - Arne Wittmaack</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <!-- Main App Container -->
  <div id="app"></div>

  <!-- Import Reusable Components -->
  <script src="assets/js/components.js"></script>

  <!-- Main Script -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const app = document.getElementById("app");

      // Add top bar component
      addTopNavigationBarWithoutImage();

      // Page Title
      app.appendChild(createElement("h1", "Article Overview"));

      // Blog Posts Data
      const blogPosts = [
      {
          "title": "Gen AI Architecture",
          "date": "<i>August 31, 2025</i>",
          "summary": "My perspective on the evolution of AI model system architecture, highlighting how Large Language Models are shifting from standalone tools to complex, composed systems.",
          "link": "model_architecture.html",
          "tags": ["Generative AI", "Machine Learning", "Architecture"]
        },
        {
          "title": "Gen AI Readiness",
          "date": "<i>July 4, 2025</i>",
          "summary": "My perspective on what recent research reveals about the real-world readiness and practical challenges of deploying generative AI applications today.",
          "link": "genai_maturity.html",
          "tags": ["Generative AI", "Machine Learning", "Current state of AI"]
        }
      ];

      // Render Blog Posts
      blogPosts.forEach(post => {
        const postContainer = createElement("div", "", { class: "blog-post" });
        const postTitle = createElement("h2");
        const postLink = createElement("a", post.title, { href: post.link });
        postTitle.appendChild(postLink);
        const postDate = createElement("p", post.date);
        const postSummary = createElement("p", post.summary);

        postContainer.appendChild(postTitle);
        postContainer.appendChild(postDate);
        postContainer.appendChild(postSummary);

        app.appendChild(postContainer);
      });

      // Add social icons
      addSocialIcons(app);
    });
  </script>
</body>
</html>
